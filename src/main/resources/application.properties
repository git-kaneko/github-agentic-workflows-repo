# MySQL 接続設定。値は環境変数で上書きできる（CI ではここを差し替える）。
# CI で EXPLAIN を取得する際は useServerPrepStmts=false（ドライバ側で値を展開）にし、
# general_log にバインド値展開済みの実 SQL を残せるようにしている。
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/todo?useServerPrepStmts=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:todo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:todo}

# 起動時にエンティティからスキーマを生成・更新する（簡易アプリ向け）。
spring.jpa.hibernate.ddl-auto=update
# 発行 SQL をログに出す（ローカルでの確認用）。
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
